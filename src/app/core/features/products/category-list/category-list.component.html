<h3>Categories</h3>
<mat-card>
  <button mat-button (click)="resetCategoryFilter()">reset filter</button>
  <mat-list>
    @for (category of store.categories(); track category?.uuid) {
      <ng-container>
        <button mat-list-item (click)="selectCategory(category)">
          {{ category.name }}
        </button>
      </ng-container>
    }
  </mat-list>
</mat-card>
