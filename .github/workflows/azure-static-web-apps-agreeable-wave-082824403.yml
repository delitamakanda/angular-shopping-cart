name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

env:
  SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_WAVE_082824403 }}
  APP_DIST: dist/angular-shopping-cart/browser

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

      - name: Deploy to production (main branch)
        if: github.event_name == 'push'
        run: |
          npx --yes @azure/static-web-apps-cli deploy \
            "$APP_DIST" \
            --deployment-token "$SWA_TOKEN" \
            --env production

      - name: Deploy preview (pull request)
        if: github.event_name == 'pull_request'
        run: |
          npx --yes @azure/static-web-apps-cli deploy \
            "$APP_DIST" \
            --deployment-token "$SWA_TOKEN" \
            --env "pr-${{ github.event.number }}"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close preview environment
        run: |
          npx --yes @azure/static-web-apps-cli close \
            --deployment-token "$SWA_TOKEN" \
            --env "pr-${{ github.event.number }}"
